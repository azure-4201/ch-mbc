<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

    <header id="header">
        <div class="container">
            <nav id="nav">
                <div id="logo">
                    <a href="index.html"><img src="img/logo.jpg" alt="HUGlogo"></a>
                </div>
                <ul class="gnb">
                    <li><a href="#">개인보증상품</a></li>
                    <li><a href="#">기업보증상품</a></li>

                    <h5>안전한 내집 마련을 위한</h5>
                    <h2>개인보증</h2>
                    <a href="#"><h6>내게 맞는 보증상품 찾기</h6></a>
                    <img src="img/img_01.jpg" alt="img_01">
                </div>
                <div class="cont1_box2">
                    <img class="dot02" src="img/dot_02.jpg" alt="dot_02">

                    <img src="img/img_03.jpg" alt="img_03">

                <div class="cont1_box3">
                    <div class="cont1_3sbox1">

                    </div>
                    <div class="cont1_3sbox2">

                    </div>
                </div>
            </div>
            <div class="content2">
                <div class="cont2_box1">
                    <img src="img/center_img.jpg" alt="center">
                </div>
            </div>
            <div class="content3">
                <div class="cont3_box1">
                    <h5>성공적인 주택사업을 위한</h5>
                    <h2>기업보증</h2>
                    <a href="#"><h6>내게 맞는 보증상품 찾기</h6></a>
                    <img src="img/img_02.jpg" alt="img_01">
                </div>
                <div class="cont3_box2">
                    <h3>주택분양보증</h3>
                    <h6>주택의 분양의 이행 또는 납부한 계약금 및

                </div>
                <div class="cont3_box3">
                    <div class="cont3_3sbox1">

                    </div>
                    <div class="cont3_3sbox2">
